name: dbt Data Quality CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run_dbt_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Install dbt and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery

      - name: Run dbt Tests
        run: |
          # 1. Navigate into your exact dbt folder
          cd dbt_transformations_07

          # 2. Automatically grab your profile name from your dbt_project.yml
          PROFILE_NAME=$(grep -i 'profile:' dbt_project.yml | awk '{print $2}' | tr -d "'\"" | tr -d '\r')

          # 3. Dynamically build the profiles.yml file using your project info
          cat > profiles.yml <<EOF
          $PROFILE_NAME:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: oauth
                project: data-engineering-portfolio
                dataset: retail_dw
                threads: 4
                timeout_seconds: 300
                location: US
          EOF

          # 4. Tell dbt to look for profiles.yml in this current folder instead of ~/.dbt/
          export DBT_PROFILES_DIR=$(pwd)

          # 5. Test the connection and run the data tests!
          dbt debug
          dbt test
